<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#b9fbc0,#98f5e1);
    text-align:center;
}

.container{
    background:white;
    width:400px;
    margin:100px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

button{
    background:#4da6ff;
    color:white;
    border:none;
    padding:8px 12px;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#efae2d;
}
</style>
</head>

<body>
    
<body>

<div class="container">

<h2 id="heading">Sample Heading</h2>

<input type="text" id="inputText" placeholder="Enter new heading">

<br><br>

<button onclick="changeHeading()">Change Heading</button>
<button onclick="changeBackground()">Change Background</button>
<button onclick="increaseFont()">Increase Font Size</button>
<br>
<button onclick="togglePara()">Show/Hide Paragraph</button>
<button onclick="resetPage()">Reset</button>

<p id="para">
This is a sample paragraph. JavaScript events can dynamically change content.
</p>

</div>
    <script src="./experiment6.js"></script>
</body>
</html>
