<!DOCTYPE html>
<html>
<head>
    <title>Vowel or Consonant Checker</title>
</head>
<body>

    <h2>Vowel and Consonant Checker</h2>

   
    <input type="text" id="charInput" maxlength="1" placeholder="Enter a character">
    
   
    <button onclick="checkCharacter()">Check</button>

   
    <p id="result"></p>

    <script>
        function checkCharacter() {
            let ch = document.getElementById("charInput").value.toLowerCase();
            let result = document.getElementById("result");

            if (ch === '') {
                result.innerHTML = "Please enter a character!";
            }
            else if (ch >= 'a' && ch <= 'z') {
                if (ch === 'a' || ch === 'e' || ch === 'i' || ch === 'o' || ch === 'u') {
                    result.innerHTML = "It is a Vowel ✅";
                } else {
                    result.innerHTML = "It is a Consonant 🔤";
                }
            }
            else {
                result.innerHTML = "Please enter a valid alphabet!";
            }
        }
    </script>

</body>
</html>
